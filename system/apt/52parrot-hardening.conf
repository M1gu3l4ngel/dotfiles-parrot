// /etc/apt/apt.conf.d/52parrot-hardening.conf
// Override de unattended-upgrades para Parrot Security 7 (echo).
//
// Apt lee los archivos de /etc/apt/apt.conf.d/ en orden alfabético y aplica
// el último valor leído. Por eso este archivo se llama 52- (después del
// default 50unattended-upgrades): reemplaza Origins-Pattern y Package-Blacklist
// sin tocar el archivo del paquete (no hay conflicto en futuros apt upgrade).
//
// Filosofía: SOLO seguridad se auto-instala. Updates regulares y backports
// requieren `apt upgrade` manual para no romper herramientas mid-engagement.

// Origin único en Parrot: o=Parrot. Sources usa parrot-security como archive
// de actualizaciones críticas. No usamos Debian-Security porque Parrot no
// pulea de ahí (todo va por sus propios mirrors).
Unattended-Upgrade::Origins-Pattern {
    "o=Parrot,a=parrot-security";
};

// Blacklist regex (Python). Paquetes que NO se auto-actualizan:
// - tor / anonsurf: cambios en config rompen el toggle Super+A.
// - nmap: flags y output behavior cambian entre minor versions.
// - metasploit-framework: update masivo, mejor manual y controlado.
// - burpsuite: idem (proxy de prueba activa).
// - linux-image- / linux-headers-: kernel updates requieren reboot, queda manual.
Unattended-Upgrade::Package-Blacklist {
    "tor$";
    "anonsurf$";
    "nmap$";
    "metasploit-framework$";
    "burpsuite";
    "linux-image-";
    "linux-headers-";
};

// Explícitos por seguridad (aunque los defaults coinciden, los dejamos visibles):
// - Sin auto-reboot: jamás reiniciar VM en medio de un engagement.
// - No remover kernels viejos: si la nueva versión falla, volver al previous.
Unattended-Upgrade::Automatic-Reboot "false";
Unattended-Upgrade::Remove-Unused-Kernel-Packages "false";
