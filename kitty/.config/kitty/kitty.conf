# ~/.config/kitty/kitty.conf
# Configuración principal de kitty (terminal por defecto, lanzada con Super+Enter).
# Incluye color.ini para la paleta de colores.
# Para recargar en caliente sin reabrir kitty: Ctrl+Shift+F5.

# ----- AVISOS Y SONIDOS -----
# Silenciar el bell del terminal (ej. cuando se cancela autocomplete en zsh).
enable_audio_bell no

# ----- INCLUDES -----
# color.ini define foreground/background, paleta de 16 colores, cursor y padding.
# OJO: kitty resuelve includes en orden; valores que se redefinan más abajo en
# este archivo sobrescriben a los del include (ver `cursor_shape` más adelante).
include color.ini

# ----- TIPOGRAFÍA -----
# HackNerdFont incluye iconos Nerd Font para prompts (P10k) y diff-icons en lazygit.
font_family CaskaydiaCove Nerd Font
font_size 11
# never = no desactivar ligaduras nunca (kitty soporta ligas estilo Fira Code).
disable_ligatures never

# ----- URLS -----
# Color y estilo del subrayado al pasar el mouse sobre una URL detectada.
url_color #61afef
url_style curly
# Detectar y subrayar URLs en el output para que sean clickeables.
detect_urls yes

# ----- KEYBINDINGS: NAVEGACIÓN ENTRE VENTANAS DE KITTY -----
# Ctrl+flechas mueve el foco entre los splits internos de kitty (no de bspwm).
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

# ----- KEYBINDINGS: BUFFERS DE COPY/PASTE -----
# F1/F2 copian/pegan en el buffer "a"; F3/F4 en el buffer "b". Útil para tener
# dos "portapapeles internos" sin depender del clipboard del sistema.
map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b

# ----- CURSOR -----
# beam: cursor tipo barra vertical (como en editores). Sobrescribe el
# `cursor_shape Underline` de color.ini porque está después del include.
cursor_shape beam
cursor_beam_thickness 1.8

# ----- INTERACCIÓN -----
# Segundos antes de ocultar el cursor del mouse cuando no se mueve.
mouse_hide_wait 3.0

# ----- RENDERING -----
# Delay (ms) entre repintados; bajarlo hace la salida más fluida pero usa más CPU.
repaint_delay 10
# Delay (ms) entre lectura de input.
input_delay 3
# Sincronizar el redibujo con la tasa de refresco del monitor (evita tearing).
sync_to_monitor yes

# ----- LAYOUT DE VENTANAS INTERNAS -----
# Alterna entre layouts (tall, fat, grid, stack). Ctrl+Shift+Z = vista en stack.
map ctrl+shift+z toggle_layout stack
# Estilo de la pestaña: powerline da forma de flecha angular.
tab_bar_style powerline
# Colores de pestañas: roja claro = inactiva, verde claro = activa.
inactive_tab_background #e06c75
active_tab_background #98c379
inactive_tab_foreground #000000
tab_bar_margin_color black

# ----- KEYBINDINGS: NUEVAS VENTANAS/TABS HEREDANDO CWD -----
# Abrir una ventana/tab nueva en el mismo directorio donde estoy ahora,
# para no tener que `cd` cada vez.
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd

# ----- TRANSPARENCIA -----
# 0.95 = ligera transparencia; deja ver el wallpaper detrás. Requiere picom.
background_opacity 1.0

# ----- SHELL POR DEFECTO -----
# Forzar zsh aunque el SHELL del sistema sea otro (útil en contenedores/VMs
# donde el default es bash).
shell zsh
