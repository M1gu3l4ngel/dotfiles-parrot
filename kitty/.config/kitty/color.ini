# ~/.config/kitty/color.ini
# Paleta de colores estilo Tokyo Night + ajustes de cursor y padding.
# Lo incluye kitty.conf con `include color.ini`.
#
# Nota: algunos valores definidos aquí (como cursor_shape) son sobrescritos
# por kitty.conf más adelante; el include va antes.

# ----- CURSOR Y VENTANA -----
# Underline = cursor como guion bajo. Sobrescrito por `cursor_shape beam` en kitty.conf.
cursor_shape          Underline
cursor_underline_thickness 1
# Padding interior en píxeles. 20px da aire alrededor del texto, mejor lectura.
window_padding_width  20

# ----- COLORES BASE -----
# foreground = color del texto normal
# background = color del fondo del terminal
foreground #a9b1d6
background #1a1b26

# ----- PALETA ANSI (colores 0-15) -----
# colorN  = versión normal del color N
# colorN+8 = versión "bright" (negrita); aquí están duplicados a propósito
#   para evitar que la negrita cambie de tono y mantener el look limpio.

# Black (negro / gris oscuro)
color0 #414868
color8 #414868

# Red (rosa salmón en Tokyo Night)
color1 #f7768e
color9 #f7768e

# Green (verde menta)
color2  #73daca
color10 #73daca

# Yellow (ámbar)
color3  #e0af68
color11 #e0af68

# Blue (azul cielo)
color4  #7aa2f7
color12 #7aa2f7

# Magenta (lila)
color5  #bb9af7
color13 #bb9af7

# Cyan (turquesa claro)
color6  #7dcfff
color14 #7dcfff

# White (gris muy claro)
color7  #c0caf5
color15 #c0caf5

# ----- CURSOR -----
# Color del cuerpo del cursor y del texto que queda debajo de él.
cursor #c0caf5
cursor_text_color #1a1b26

# ----- SELECCIÓN -----
# Cuando se selecciona texto con el ratón.
selection_foreground #7aa2f7
selection_background #28344a
