# ~/.config/kitty/color.ini
# Paleta de colores Monokai Soda (alineada con Windows Terminal y VS Code).
# Lo incluye kitty.conf con `include color.ini`.
#
# Nota: algunos valores definidos aquí (como cursor_shape) son sobrescritos
# por kitty.conf más adelante; el include va antes.

# ----- CURSOR Y VENTANA -----
# Underline = cursor como guion bajo. Sobrescrito por `cursor_shape beam` en kitty.conf.
cursor_shape          Underline
cursor_underline_thickness 1
# Padding interior en píxeles. 20px da aire alrededor del texto, mejor lectura.
window_padding_width  20

# ----- COLORES BASE -----
# foreground = color del texto normal (crema beige)
# background = color del fondo del terminal (negro absoluto)
foreground #C4C5B5
background #1A1A1A

# ----- PALETA ANSI (colores 0-15) -----
# Monokai Soda — paleta clásica con acentos rosa fuerte / lima / lila.
# colorN   = versión normal del color N (mate)
# colorN+8 = versión "bright" (negrita / acentuada)

# Black (negro / gris oscuro)
color0 #1A1A1A
color8 #625E4C

# Red (rosa fuerte característico de Monokai)
color1 #F4005F
color9 #F4005F

# Green (verde lima brillante)
color2  #98E024
color10 #98E024

# Yellow (naranja en normal, amarillo dorado en bright)
color3  #FA8419
color11 #E0D561

# Blue (lila / violeta)
color4  #9D65FF
color12 #9D65FF

# Magenta (rosa fuerte — Monokai usa el mismo tono para red y magenta)
color5  #F4005F
color13 #F4005F

# Cyan (turquesa claro)
color6  #58D1EB
color14 #58D1EB

# White (crema en normal, blanco hueso en bright)
color7  #C4C5B5
color15 #F6F6EF

# ----- CURSOR -----
# Color del cuerpo del cursor y del texto que queda debajo de él.
cursor #F6F7EC
cursor_text_color #1A1A1A

# ----- SELECCIÓN -----
# Cuando se selecciona texto con el ratón.
selection_foreground #C4C5B5
selection_background #343434
