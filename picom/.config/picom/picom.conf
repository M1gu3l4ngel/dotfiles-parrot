# ~/.config/picom/picom.conf
# Configuración del compositor picom.
# picom se encarga de sombras, transparencias, blur, fades y esquinas
# redondeadas. Sin él las ventanas se ven planas y sin antialiasing.
# bspwm lo lanza al iniciar (línea `picom &` en bspwmrc).
# Para recargar: `pkill picom && picom &` desde una terminal.

# ----- ESQUINAS REDONDEADAS -----
# Radio en píxeles para redondear las esquinas de todas las ventanas.
# Requiere una build de picom con soporte para corners (fork de sdhand).
corner-radius = 20;

# Apps que NO deben tener esquinas redondeadas. Útil cuando una app dibuja
# su propio fondo y el corte queda feo. Vacío por defecto: redondea todo.
rounded-corners-exclude = [
  #"window_type = 'normal'",
  #"class_g = 'firefox'",
];

# Redondeo del propio borde de bspwm (no del contenido). Aquí 20 px para que
# coincida visualmente con el corner-radius de arriba.
round-borders = 20;
round-borders-exclude = [
  #"class_g = 'TelegramDesktop'",
];

# Reglas para anchos de borde específicos por aplicación, formato `PIXELS:PATTERN`.
# Vacío: todas las ventanas usan el border_width definido por bspwm.
round-borders-rule = [];

# ----- SOMBRAS -----
# Sombras desactivadas globalmente. Los valores siguientes quedan listos por si
# se reactivan poniendo `shadow = true`. Ojo: las sombras son caras en GPU
# integradas y pueden generar parpadeo con vsync = false.
shadow = false

# Radio del blur de la sombra (default 12). Más alto = sombra más difusa.
shadow-radius = 15

# Opacidad de la sombra entre 0.0 (invisible) y 1.0 (negro sólido).
shadow-opacity = .5

# Desplazamiento de la sombra respecto a la ventana. Valores negativos la mueven
# arriba/izquierda, positivos abajo/derecha.
shadow-offset-x = -15
shadow-offset-y = -15

# Apps a las que nunca se les dibuja sombra. Firefox con fondo ARGB se excluye
# porque genera artefactos visuales en los bordes.
shadow-exclude = [
  "class_g = 'firefox' && argb"
];

# ----- FADING -----
# Fades activos por defecto (no se desactivan explícitamente).
# Estos valores controlan los pasos de animación al abrir/cerrar ventanas
# o al cambiar opacidad.

# Incremento de opacidad por paso al aparecer. Más bajo = animación más suave
# pero también más lenta. 0.01 da un fade visible pero rápido.
fade-in-step = 0.01;

# Mismo concepto al desaparecer la ventana.
fade-out-step = 0.01;

# ----- OPACIDAD -----
# Todo a 1.0 = sin transparencias. Si quieres ventanas inactivas semi-transparentes
# baja `inactive-opacity` a algo como 0.85.
inactive-opacity = 1.0
frame-opacity = 1.0
opacity = 1.0

# Si está en true, picom fuerza la opacidad de inactive-opacity por encima de
# cualquier valor que la app declare vía _NET_WM_OPACITY. En false respetamos
# lo que pida cada app.
inactive-opacity-override = false;

active-opacity = 1.0

# Apps que siempre se consideran "enfocadas" para efectos de opacidad. Cairo-clock
# se incluye porque al perder foco se le pone fondo translúcido y se ve mal.
focus-exclude = [ "class_g = 'Cairo-clock'" ];

# ----- BLUR -----
# Blur desactivado: con `blur-method = "none"` los valores siguientes son inertes.
# Si quieres activar blur en ventanas semi-transparentes cambia el method a
# "dual_kawase" o "gaussian" y pon blur-background = true.
blur-method = "none"
blur-size = 2
blur-strength = 3
blur-background = false

# ----- BACKEND Y RENDIMIENTO -----
# glx = OpenGL. Más rápido que xrender en GPUs modernas y necesario para que
# el blur con dual_kawase funcione. Si tienes problemas raros de renderizado,
# cambia a "xrender".
backend = "glx";

# VSync desactivado: en bspwm + glx puede causar lag al mover ventanas en algunas
# máquinas. Si ves tearing horizontal, ponlo en true.
vsync = false

# Heurísticas para que picom detecte correctamente qué ventana tiene foco.
# Ambas en true porque bspwm usa override-redirect en algunos casos y sin esto
# las ventanas se quedan con opacidad de "inactiva" aunque estén enfocadas.
mark-wmwin-focused = true;
mark-ovredir-focused = true;

# Permite a picom darse cuenta de que una ventana ya tiene corners redondeados
# (dibujados por la app) y no aplicarles el suyo encima.
detect-rounded-corners = true;

# Lee _NET_WM_OPACITY de la ventana cliente, no solo del frame. Sin esto, los
# valores de opacidad por app no funcionan en ciertos WMs.
detect-client-opacity = true;

# Agrupa ventanas hijas (dialogs, popups) con su padre para que compartan
# el estado "enfocado". Sin esto, al abrir un menú la ventana padre se atenúa.
detect-transient = true
detect-client-leader = true

# Solo redibuja las regiones de pantalla que cambiaron. Reduce mucho el uso
# de CPU/GPU. Desactivar solo si hay artefactos visuales.
use-damage = true

# Nivel de log. "warn" = solo avisos y errores. Subir a "debug" para depurar.
log-level = "warn";

# ----- WINTYPES (PERFILES POR TIPO DE VENTANA) -----
# Cada tipo EWMH (tooltip, menus, dnd, etc.) puede tener su propio comportamiento
# de fade, shadow y opacidad. Aquí desactivamos sombras en menús y drag&drop
# para que no dejen marcas al cerrarse rápido, y damos a los tooltips una sombra
# personalizada más densa y desplazada.
wintypes:
{
  tooltip       = { fade = true; shadow = true; shadow-radius = 0; shadow-opacity = 1.0; shadow-offset-x = -20; shadow-offset-y = -20; opacity = 0.8; full-shadow = true; };
  dnd           = { shadow = false; }
  dropdown_menu = { shadow = false; };
  popup_menu    = { shadow = false; };
  utility       = { shadow = false; };
}
