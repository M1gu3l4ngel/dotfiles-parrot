;; ~/.config/polybar/workspace.ini
;; Configuración del bar de workspaces (escritorios) que aparece centrado
;; en la parte superior del escritorio. Muestra los workspaces de bspwm con
;; iconos y resalta el activo.
;;
;; launch.sh lanza esta barra con:
;;   polybar primary -c ~/.config/polybar/workspace.ini
;;
;; Recargar: Super+Shift+R o ~/.config/polybar/launch.sh

;; ----- AJUSTES GLOBALES DEL WM -----
;; Sin reserva de espacio: la barra flota sobre el escritorio.
[global/wm]
margin-bottom = 0
margin-top = 0

;; ----- INCLUDES -----
;; Paleta compartida (mismo colors.ini que current.ini).
include-file = ~/.config/polybar/colors.ini

;; =============================================================================
;; BAR PRINCIPAL (TEMPLATE BASE)
;; =============================================================================
;; bar/main no se lanza directamente; sirve como plantilla para bar/primary
;; (que sí se lanza desde launch.sh). Mantiene los defaults visuales (fuentes,
;; padding, radius) en un solo lugar para no duplicarlos.
[bar/main]
monitor =
monitor-fallback =
;; false: tolera reportes incorrectos de XRandR sobre el estado del monitor.
monitor-strict = false

;; bottom = true está comentado: este bar flota arriba, no abajo.
;bottom = true

;; Centrado fijo: el bloque modules-center no se desplaza aunque crezcan
;; los bloques laterales.
fixed-center = true

width = 18%
height = 40
offset-x = 20
offset-y = 20

background = ${color.bg}
;background = #A7D6FD
foreground = ${color.fg}

;; Esquinas redondeadas para look estilo "pill".
radius-top = 10.0
radius-bottom = 10.0

;; Líneas decorativas opcionales (usadas por algunos módulos al hacer hover).
line-size = 2
line-color = ${color.ac}

;; Sin borde visible.
border-size = 0
border-color = ${color.bg}

padding = 2
module-margin-left = 1
module-margin-right = 1

;; Fuentes referenciables por índice (%{TN}...%{T-}) en labels de módulos.
font-0 = "Iosevka Nerd Font:size=18;5"
font-1 = "Iosevka Nerd Font:size=12;2"
font-2 = "Iosevka Nerd Font:bold:size=24;2"

;; =============================================================================
;; BARS
;; =============================================================================

;; ----- primary: barra de workspaces (centro-arriba) -----
;; Es la única que se lanza desde launch.sh con este archivo.
;; override-redirect = true hace que bspwm no la trate como ventana gestionable
;; (no se puede mover ni hacer tile sobre ella).
[bar/primary]
inherit = bar/main
background = ${color.bg}
override-redirect = true
wm-restack = bspwm
offset-x = 41%
offset-y = 15
bottom = false
padding = 1
module-margin-left = 0
module-margin-right = 0
modules-center = workspaces

;; ----- secondary: reservado, no se lanza desde launch.sh -----
;; Pensado para mostrar nombre del workspace + título de la ventana actual.
;; Se puede activar añadiendo `polybar secondary -c workspace.ini &` a launch.sh.
[bar/secondary]
inherit = bar/main
offset-x = 30
offset-y = 70
background = ${color.trans}
foreground = ${color.white}
padding = 1
module-margin-left = 0
module-margin-right = 0
modules-left = name sep title

;; ----- AJUSTES COMUNES -----
;; Igual que en current.ini: estos valores quedan asociados al último [bar/...]
;; declarado por cómo polybar parsea el INI, pero funcionan como defaults
;; razonables si algún bar no los redefine.

separator =
spacing = 0
dim-value = 1.0
wm-name = openbox
locale =

;; ----- TRAY -----
;; Bandeja del sistema desactivada: esta barra solo muestra workspaces.
tray-position = none
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${color.bg}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

;; Restackear sobre las ventanas raíz para no quedar tapado por fullscreens.
wm-restack = bspwm

;; IPC: permite controlar la barra con `polybar-msg`.
enable-ipc = true

;; Click/scroll fuera de módulos = sin acción.
click-left =
click-middle =
click-right =
scroll-up =
scroll-down =
double-click-left =
double-click-middle =
double-click-right =

;; Cursores al pasar sobre elementos interactivos (requiere xcb-util-cursor).
cursor-click =
cursor-scroll =

;; =============================================================================
;; SETTINGS DEL DAEMON
;; =============================================================================
[settings]
;; throttle-output / throttle-output-for / throttle-input-for fueron removidos:
;; polybar nuevo los marca como deprecated y tira warnings en cada reload.
;; Polybar maneja throttling internamente, ya no se configura desde acá.

;; No recargar la barra al detectar cambio de monitor (launch.sh la reinicia
;; manualmente si hace falta). Evita parpadeo al conectar HDMI.
screenchange-reload = false

;; Operadores de composición cairo: "source" pinta opaco, "over" mezcla.
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

;; Defaults globales de color para el `format` de cualquier módulo. Vacíos =
;; sin override; cada módulo define los suyos cuando hace falta.
;; format-spacing / format-padding / format-margin / format-offset fueron
;; removidos: esperan valores numéricos y polybar tira "Invalid value
;; (reason: stof)" al parsear el string vacío en cada módulo cargado.
format-foreground =
format-background =
format-underline =
format-overline =

;; Pseudo-transparencia desactivada porque ya usamos picom como compositor.
pseudo-transparency = false

;; =============================================================================
;; MÓDULOS
;; =============================================================================

;; ----- workspaces: lista de escritorios (módulo activo en bar/primary) -----
;; Usa internal/xworkspaces (compatible con bspwm porque expone _NET_DESKTOP_*).
;; Cada workspace tiene un icono asociado (icon-N). Los labels distinguen entre
;; estados: active (foco), occupied (ventanas pero no foco), urgent (alerta), empty.
[module/workspaces]
type = internal/xworkspaces

;; Pin: no mezcla workspaces de otros monitores.
pin-workspaces = true
;; Permite cambiar de workspace haciendo click o scroll sobre la barra.
enable-click = true
enable-scroll = true

;; Fuentes de iconos específicas para este módulo (sobrescriben las del bar).
font-0 = Material Icons:style=Regular
font-1 = FontAwesome5Free:style=Solid:pixelsize=10:antialias=false;3
font-2 = FontAwesome5Brands:style=Solid:pixelsize=10:antialias=false;3

;; Iconos asignados a cada workspace (1-5). El resto usa icon-default.
;icon-0 = 1;
icon-0 = 1;-
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
;icon-default =
;icon-default = ─
icon-default = ∙

format = <label-state>
format-padding = 0

;; Workspace activo: punto en azul.
;label-active = ""
label-active = "∙ "
label-active-foreground = ${color.active}
label-active-background = ${color.bg}

;; Workspaces con ventanas pero no enfocados: icono blanco.
label-occupied = "%icon% "
label-occupied-foreground = ${color.ac}
label-occupied-background = ${color.bg}

;; Workspaces urgentes (apps pidiendo atención): color de acento.
label-urgent = "%icon% "
label-urgent-foreground = ${color.ac}
label-urgent-background = ${color.bg}

;; Workspaces vacíos: mismo icono pero más sutil.
label-empty = "%icon% "
label-empty-foreground = ${color.white}
label-empty-background = ${color.bg}

;; ----- name: nombre del workspace activo (no usado por bar activo) -----
[module/name]
type = internal/xworkspaces
format = <label-state>
format-foreground = ${color.fg}
format-font = 3
format-padding = 0
label-active = "%name%"
label-occupied =
label-urgent =
label-empty =

;; ----- title: título de la ventana enfocada (no usado por bar activo) -----
;; Trunca a 20 caracteres para no romper el layout cuando el título es largo.
[module/title]
type = internal/xwindow
format = <label>
format-foreground = ${color.fg}
format-font = 2
label = %title%
label-maxlen = 20
label-empty = Desktop

;; ----- sep / sep2: separadores visuales (no usados por bar activo) -----
[module/sep]
type = custom/text
content = " | "
content-font = 2
;;content-background = #000
content-foreground = ${color.fg}
;;content-padding = 4

[module/sep2]
type = custom/text
content = "   "
;;content-background = #000
content-foreground = ${color.fg}
;;content-padding = 4
