;; ~/.config/polybar/current.ini
;; Configuración principal de polybar: define las barras flotantes
;; (info de red, VPN, target a hackear, menú de sistema) que aparecen
;; sobre el escritorio de bspwm.
;;
;; launch.sh lanza varias instancias de polybar usando este archivo:
;;   polybar log            -> barra estrecha a la izquierda con un texto/icono
;;   polybar ethernet_bar   -> estado de la interfaz Ethernet
;;   polybar vpn_bar        -> estado de la VPN (HTB/THM)
;;   polybar target_to_hack -> IP de la víctima cuando se exporta $RHOST
;;   polybar primary        -> botón circular con menú de apagado
;;
;; Recargar: Super+Shift+R (lanza launch.sh) o desde terminal:
;;   ~/.config/polybar/launch.sh

;; ----- AJUSTES GLOBALES DEL WM -----
;; Reservas de espacio para que bspwm no coloque ventanas debajo de la barra.
;; Aquí ambos en 0 porque las barras flotan sobre el escritorio en posiciones
;; fijas (ver offset-x/offset-y por cada bar), no ocupan un borde entero.
[global/wm]
margin-bottom = 0
margin-top = 0

;; ----- INCLUDES -----
;; colors.ini define la paleta usada por ${color.bg}, ${color.fg}, etc.
;; Cambiar de tema = sobrescribir colors.ini con colors_dark.ini o colors_light.ini.
include-file = ~/.config/polybar/colors.ini

;; =============================================================================
;; BAR PRINCIPAL (TEMPLATE BASE)
;; =============================================================================
;; bar/main no se lanza directamente: sirve como plantilla. Todos los demás bars
;; hacen `inherit = bar/main` y sobrescriben solo lo necesario (ancho, offset,
;; módulos). Esto evita duplicar fuentes, padding y colores en cada bar.
[bar/main]
;; Sin monitor específico = usa el primero detectado por xrandr.
monitor =
monitor-fallback =
;; false: no exige que el monitor esté "connected" según XRandR (a veces
;; reporta mal estado aunque esté en uso).
monitor-strict = false

;; Posicionamiento y tamaño base (los hijos lo sobrescriben).
bottom = true
fixed-center = true
width = 17%
height = 60
offset-x = 20
offset-y = 20

;; Colores referenciados desde colors.ini.
background = ${color.bg}
foreground = ${color.fg}

;; Esquinas redondeadas (radio en px) para look estilo "card" flotante.
;; Ojo: no combinar con border-size > 0, el borde no se redondea.
radius-top = 10.0
radius-bottom = 10.0

;; Líneas decorativas sobre/bajo cada módulo (color de acento).
line-size = 2
line-color = ${color.ac}

;; Sin borde inferior visible; el color queda definido por si se reactiva.
border-bottom-size = 0
border-color = ${color.ac}

padding = 2
module-margin-left = 1
module-margin-right = 1

;; Fuentes disponibles, referenciables por índice con %{TN}...%{T-} en labels.
;; font-N = "<nombre>:<estilo>:size=<px>;<offset-vertical>"
;; Para iconos Nerd Font usamos Iosevka y Hurmit; para texto usual Helvetica/Montserrat.
font-0 = "Iosevka Nerd Font:size=13;3"
font-1 = "Iosevka Nerd Font:bold:size=24;2"
font-2 = "Iosevka Nerd Font:size=22;6"
font-3 = "Source Code Pro:size=10;3"
font-5 = "Helvetica Rounded:style=Bold:size=10.5;3"
font-4 = "Montserrat Medium:style=Medium:size=12;3"
font-6 = "Hurmit Nerd Font Mono:style=medium:pixelsize=17;3"
font-7 = "Hack Nerd Font Mono:size=20;6"

;; =============================================================================
;; BARS FLOTANTES (los que sí se lanzan desde launch.sh)
;; =============================================================================
;; Cada bar es una mini-barra independiente con su propia posición y módulo.
;; Todos heredan de bar/main y sobrescriben offset, ancho y modules-center.

;; ----- primary: botón de power-menu (esquina superior derecha) -----
[bar/primary]
inherit = bar/main
offset-x = 96.9%
offset-y = 15
width = 2.5%
height = 40
bottom = false
padding = 0
module-margin-left = 0
module-margin-right = 0
background = #1A1B27
;foreground = ${color.blue}
foreground = #44abff
;modules-center = web sep2 files sep2 edit sep2 apps
modules-center = sysmenu
wm-restack = bspwm

;; ----- vpn_bar: estado VPN (HTB / THM / desconectado) -----
[bar/vpn_bar]
inherit = bar/main
width = 12%
height = 40
offset-x = 16%
offset-y = 15
background = #1A1B27
foreground = ${color.white}
bottom = false
padding = 1
;padding-top = 2
module-margin-left = 0
module-margin-right = 0
;modules-left = date sep mpd
modules-center = vpn_status
wm-restack = bspwm

;; ----- ethernet_bar: IP local de la interfaz Ethernet -----
[bar/ethernet_bar]
inherit = bar/main
width = 12%
height = 40
offset-x = 3.8%
offset-y = 15
background = #1A1B27
foreground = ${color.white}
bottom = false
padding = 1
;padding-top = 2
module-margin-left = 0
module-margin-right = 0
;modules-left = date sep mpd
modules-center = ethernet_status
wm-restack = bspwm

;; ----- target_to_hack: IP del objetivo (sale al hacer settarget en zsh) -----
[bar/target_to_hack]
inherit = bar/main
width = 15.7%
height = 40
offset-x = 81%
offset-y = 15
background = #1A1B27
foreground = ${color.white}
bottom = false
padding = 1
;padding-top = 2
module-margin-left = 0
module-margin-right = 0
;modules-left = date sep mpd
modules-center = target_module
wm-restack = bspwm

;; ----- secondary: reservado, no se lanza desde launch.sh -----
;; Se conserva por si en el futuro quieres una barra con la fecha; basta con
;; añadir `polybar secondary -c current.ini &` a launch.sh.
[bar/secondary]
inherit = bar/main
width = 7%
height = 40
offset-x = 3.8%
offset-y = 15
background = #1A1B27
foreground = ${color.white}
bottom = false
padding = 1
;padding-top = 2
module-margin-left = 0
module-margin-right = 0
;modules-left = date sep mpd
modules-center = date
wm-restack = bspwm

;; ----- log: barra estrecha con un icono/etiqueta a la izquierda -----
[bar/log]
inherit = bar/main
width = 2.5%
height = 40
offset-x = 1%
offset-y = 15
bottom = false
foreground = ${color.white}
background = #1A1B27
padding = 0
modules-center = my-text-label
wm-restack = bspwm
;override-redirect = true

;; ----- top: reservado, no se lanza desde launch.sh -----
;; Pensado para mostrar volumen/batería/red juntos.
[bar/top]
inherit = bar/main
width = 6%
height = 40
offset-x = 90.5%
offset-y = 15
bottom = false
font-0 = "Iosevka Nerd Font:size=12;3"
background = #1A1B27
padding = 1
module-margin-left = 1
module-margin-right = 1
;wm-restack = bspwm
modules-center = alsa battery network

;; ----- AJUSTES COMUNES (heredados por el último [bar/...] declarado) -----
;; Por la forma del INI, estos valores aplican al bar/top de arriba, pero por
;; cómo polybar los procesa también funcionan como defaults razonables para
;; cualquier bar que no los redefina.

;; Texto que se inserta entre módulos (vacío = nada).
separator =
;; Espaciado extra entre elementos (deprecated en versiones recientes de polybar).
spacing = 0
;; Opacidad usada en transiciones de fade.
dim-value = 1.0
;; WM_NAME asignado a la ventana de polybar. "openbox" se usa por compatibilidad
;; con WMs que esperan ese nombre (algunos hacks viejos lo asumen).
wm-name = openbox
;; Locale para textos localizados (fechas, etc.). Vacío = locale del sistema.
locale =

;; ----- TRAY -----
;; tray-position = none: no se muestra la bandeja del sistema en estas barras.
;; Si la quieres, pon "right" o "left" en uno de los bars.
tray-position = none
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${color.bg}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

;; Restackear la barra sobre las ventanas raíz de bspwm: evita que las ventanas
;; en fullscreen tapen la barra.
wm-restack = bspwm

;; IPC: permite enviar comandos a polybar con `polybar-msg` (útil para toggles).
enable-ipc = true

;; Handlers vacíos = ignorar clicks y scrolls fuera de los módulos.
click-left =
click-middle =
click-right =
scroll-up =
scroll-down =
double-click-left =
double-click-middle =
double-click-right =

;; Cursores al pasar sobre módulos clickeables/scrollables. Requiere xcb-util-cursor.
cursor-click =
cursor-scroll =

;; =============================================================================
;; SETTINGS DEL DAEMON
;; =============================================================================
[settings]
;; Throttle: si llegan muchos eventos seguidos, agrupa los redibujos para no
;; pintar la barra en cada uno. Valores conservadores para no perder responsividad.
throttle-output = 5
throttle-output-for = 10
throttle-input-for = 30

;; false: no recargar la barra al detectar cambios de monitor (lo hace launch.sh
;; manualmente si hace falta). Evita parpadeos al conectar un HDMI.
screenchange-reload = false

;; Operadores de composición de cairo para las distintas capas de la barra.
;; "source" en background pinta opaco; "over" mezcla normalmente.
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

;; Defaults globales aplicados al `format` de cualquier módulo. Vacíos = sin
;; override; cada módulo define los suyos.
format-foreground =
format-background =
format-underline =
format-overline =
format-spacing =
format-padding =
format-margin =
format-offset =

;; Si está en true, la barra puede ser transparente sin compositor (picom).
;; Aquí false porque sí usamos picom y dejamos que él haga la transparencia.
pseudo-transparency = false

;; =============================================================================
;; MÓDULOS
;; =============================================================================

;; ----- my-text-label: etiqueta vacía usada como spacer/icono en bar/log -----
[module/my-text-label]
type = custom/text
content = %{T7}
;interval = 1.0
;time = %k : %M
;date = %b %e
;format = <label1>
;format-foreground = ${color.white}
;label1 = aadasd
;label1-font = 7

;; ----- date: fecha y hora (no usado por ningún bar activo) -----
[module/date]
type = internal/date
interval = 1.0
time = %k : %M
date = %b %e
;padding-top = 2
format = <label>
format-foreground = ${color.white}
;format-background = $(color.blue}
;label = %{T7} %{T6}%date%|%time%
;label = %{T7} %{T6}Pop! OS  |   %time%
label = %date%  |  %time%
label-font = 6

;; ----- mpd: música (no usado por ningún bar activo) -----
[module/mpd]
type = internal/mpd
interval = 2
format-online = <label-song>
format-online-foreground = ${color.fg}
label-song = "%title%"
label-song-maxlen = 12
label-song-ellipsis = true
label-offline = "Offline"

;; ----- Iconos de apps clickeables (no usados por ningún bar activo) -----
;; Cada bloque es un icono Nerd Font con click-left que abre la app.

[module/term]
type = custom/text
content = "%{T3}%{T-}"
content-foreground = ${color.black}
content-background = ${color.bg}
content-padding = 0
click-left  = termite &

[module/web]
type = custom/text
content = "%{T3}%{T-}"
content-foreground = ${color.white}
content-background = ${color.bg}
content-padding = 0
click-left  = firefox &

[module/files]
type = custom/text
content = "%{T3}%{T-}"
content-foreground = ${color.blue}
content-background = ${color.bg}
content-padding = 0
click-left  = thunar &

[module/edit]
type = custom/text
content = "%{T3}%{T-}"
content-foreground = ${color.blue-gray}
content-background = ${color.bg}
content-padding = 0
click-left  = geany &

[module/apps]
type = custom/text
content = "%{T3}%{T-}"
content-foreground = ${color.fg}
content-background = ${color.bg}
content-padding = 0
click-left  = ~/.config/polybar/scripts/launcher &

;; ----- Separadores visuales (no usados por ningún bar activo) -----
[module/sep]
type = custom/text
content = " | "
content-font = 1
;;content-background = #000
content-foreground = ${color.fg}
;;content-padding = 4

[module/sep2]
type = custom/text
content = "   "
;;content-background = #000
content-foreground = ${color.fg}
;;content-padding = 4

;; ----- alsa: volumen (no usado por ningún bar activo) -----
;; Cada icono tiene un click derecho (%{A3:...}) que abre pavucontrol.
[module/alsa]
type = internal/alsa
;format-background = ${color.blue}
format-volume = <ramp-volume>
format-muted = <label-muted>
label-muted = %{A3:pavucontrol &:} 婢 %{A}
label-muted-foreground = ${color.gray}
;click-right = pavucontrol
ramp-volume-0 = %{A3:pavucontrol &:} 奄%{A}
ramp-volume-1 = %{A3:pavucontrol &:}奔%{A}
ramp-volume-2 = %{A3:pavucontrol &:}奔%{A}
ramp-volume-3 = %{A3:pavucontrol &:}墳%{A}
ramp-volume-4 = %{A3:pavucontrol &:}墳%{A}
ramp-volume-foreground = ${color.white}

;; ----- battery: nivel de batería (no usado por ningún bar activo) -----
;; Si lo vas a activar, verifica que BAT1/ACAD coincidan con tu hardware:
;;   ls /sys/class/power_supply/
[module/battery]
type = internal/battery
full-at = 99
battery = BAT1
adapter = ACAD
poll-interval = 2
time-format = %H:%M
format-charging = <animation-charging>
format-discharging = <ramp-capacity>
format-full = <label-full>
format-full-foreground = ${color.white}
;format-full-background = $(color.white}
label-full = 
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-5 = 
ramp-capacity-6 = 
ramp-capacity-7 = 
ramp-capacity-8 = 
ramp-capacity-9 = 
ramp-capacity-foreground = ${color.white}
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-5 = 
animation-charging-6 = 
animation-charging-7 = 
animation-charging-8 = 
animation-charging-9 = 
animation-charging-foreground = ${color.white}
animation-charging-framerate = 750

;; ----- network: estado wifi (no usado por ningún bar activo) -----
;; Cambia `interface` por el nombre real (`ip link` para verlo).
[module/network]
type = internal/network
interface = wlp2s0
click-left = kcmshell5 kcm_networkmanagement
interval = 1.0
accumulate-stats = true
unknown-as-up = true
format-connected = <label-connected>
format-connected-foreground = ${color.white}
;content-background = $(color.blue}
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${color.gray}
label-connected = 直
label-disconnected = 睊

;; ----- sysmenu: icono de power-menu (usado por bar/primary) -----
;; Al hacer click izquierdo se ejecuta el script powermenu_alt (rofi con
;; opciones de apagar/reiniciar/bloquear).
[module/sysmenu]
type = custom/text
content = 襤
;content-foreground = ${color.white}
click-left = ~/.config/polybar/scripts/powermenu_alt

;; ----- Módulos de scripts personalizados (los activos del setup) -----
;; Cada uno corre un script en ~/.config/scripts/ y muestra su stdout cada
;; `interval` segundos. Esos scripts viven en scripts/.config/scripts/ del repo.

[module/ethernet_status]
type = custom/script
interval = 2
exec = ~/.config/scripts/ethernet_status.sh

[module/target_module]
type = custom/script
interval = 2
exec = ~/.config/scripts/victim_to_hack.sh

[module/vpn_status]
type = custom/script
interval = 2
exec = ~/.config/scripts/vpn_status.sh
